<!doctype html>
<html lang="en">
<head>
  <title>Cards and Bees</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f1923;
      color: #dde3ea;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }

    /* ── Buttons ─────────────────────────────────────────── */

    button {
      background: #1e3a5a;
      border: 1px solid #2d5480;
      color: #dde3ea;
      padding: 10px 22px;
      font-size: 14px;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    button:hover  { background: #2a4d75; border-color: #4a7ab5; }
    button:active { background: #1a3048; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    button.btn-gold {
      background: #6b4e1a;
      border-color: #c9a84c;
      color: #f0d890;
    }
    button.btn-gold:hover { background: #8a6420; }
    button.btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ── Inputs ──────────────────────────────────────────── */

    input[type=text] {
      background: #141f2e;
      border: 1px solid #2a3d55;
      color: #dde3ea;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    input[type=text]:focus { border-color: #4a7ab5; }
    input[type=text]::placeholder { color: #4a6070; }

    /* ── Section visibility ──────────────────────────────── */

    #rooms, #solitaire-menu { display: none; }
    #game { display: none; }

    /* ── Main menu ───────────────────────────────────────── */

    #main-menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 14px;
    }

    .menu-title {
      font-size: 2.8rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    /* ── Room browser ────────────────────────────────────── */

    #rooms {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 28px;
      gap: 20px;
    }

    #rooms-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #rooms-header h2 {
      flex: 1;
      font-size: 1.3rem;
      font-weight: 500;
      color: #c9a84c;
    }

    #rooms-content {
      display: flex;
      gap: 24px;
      flex: 1;
      overflow: hidden;
    }

    #rooms-grid {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 12px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .room-card {
      background: #141f2e;
      border: 1px solid #2a3d55;
      border-radius: 12px;
      padding: 16px 18px;
      width: 210px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .room-card-name {
      font-size: 1rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-card-players { font-size: 0.82rem; color: #6a90b0; }
    .room-card-empty {
      color: #4a6070;
      font-style: italic;
      font-size: 0.9rem;
      padding: 8px 4px;
    }

    #create-room-panel {
      width: 250px;
      flex-shrink: 0;
      background: #141f2e;
      border: 1px solid #2a3d55;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: fit-content;
    }
    #create-room-panel h3 { font-size: 0.95rem; font-weight: 500; color: #c9a84c; }
    #create-room-panel input { width: 100%; }

    /* ── Solitaire menu ──────────────────────────────────── */

    #solitaire-menu {
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #solitaire-menu h2 { font-size: 1.5rem; color: #c9a84c; margin-bottom: 8px; }
    .solitaire-game { width: 210px; }

    /* ── Game ────────────────────────────────────────────── */

    #game {
      position: fixed;
      inset: 0;
      background: #152a1e;
      background-image: radial-gradient(ellipse at 50% 50%, #1c3828 0%, #0e1f14 100%);
      overflow: hidden;
      flex-direction: column;
    }

    /* opponents strip — flex child at top, full-width column */
    #opponents-strip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    /* stacks zone — absolute overlay at vertical center */
    #stacks-zone {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      z-index: 5;
    }

    /* ── Cards ───────────────────────────────────────────── */

    :root { --card-rendering: pixelated; }

    .card {
      position: absolute;
      width: 96px;
      height: 140px;
      background-size: 100% 100%;
      image-rendering: var(--card-rendering);
      background-color: #000 !important;
      border-radius: 10px;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
      cursor: grab;
    }
    .card:active { cursor: grabbing; }

    /* ── Card stacks ─────────────────────────────────────── */

    .card-stack {
      position: relative;
      width: 112px;
      height: 176px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .card-stack:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); }
    .card-stack.has-cards { border-style: solid; border-color: rgba(255,255,255,0.1); }

    .stack-card-wrap {
      position: absolute;
      top: 18px;
      left: 8px;
    }

    .stack-count {
      position: absolute;
      top: 4px;
      right: 6px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      color: #9ac0dc;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 8px;
      min-width: 22px;
      text-align: center;
      z-index: 2;
    }

    .stack-label {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 2;
    }

    /* ── Player zones ────────────────────────────────────── */

    /* Self zone: pushed to bottom of #game via margin-top:auto */
    .player-self-zone {
      flex-shrink: 0;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 6px 16px 10px;
      z-index: 10;
    }

    /* Opponent zone: full-width strip at top of screen */
    .player-opponent-zone {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 16px 8px;
      background: rgba(8,15,25,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      pointer-events: auto;
    }

    /* Play areas — each player's personal table space */
    .player-play-area {
      position: relative;
      height: 160px;
      min-width: 240px;
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      overflow: visible;
      transition: border-color 0.2s, background 0.2s;
    }
    .player-play-area.has-cards {
      border-style: solid;
      border-color: rgba(255,255,255,0.1);
    }

    .self-play-area {
      min-width: 560px;
      height: 200px;
      background: rgba(0,0,0,0.12);
    }

    .opponent-play-area {
      min-width: 560px;
      height: 200px;
    }

    .player-play-area.drag-over {
      border-color: rgba(201,168,76,0.6);
      background: rgba(201,168,76,0.07);
    }

    .play-area-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Hand strip (self) */
    .player-hand-strip {
      position: relative;
      min-width: 240px;
      height: 180px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 6px 10px;
      background: rgba(8,15,25,0.88);
    }

    .player-name {
      font-size: 13px;
      font-weight: 600;
      color: #6a90b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .player-name.is-self { color: #c9a84c; }

    .hand-summary { font-size: 13px; color: #7a9ab8; }

    .opponent-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .opponent-header .player-name { margin-bottom: 0; }

    /* ── Solitaire shared ────────────────────────────────── */

    .sol-top-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(8,15,25,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 10;
    }

    .sol-title {
      font-size: 18px;
      font-weight: 600;
      color: #c9a84c;
      letter-spacing: 0.5px;
    }

    .sol-health {
      font-size: 22px;
      font-weight: 700;
      color: #77bb77;
      min-width: 60px;
    }

    .sol-moves {
      font-size: 14px;
      color: #9ac0dc;
      font-weight: 600;
    }

    .sol-warning {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-left: auto;
    }

    .sol-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }

    .sol-btn {
      background: rgba(255,255,255,0.08);
      color: #b8c8d8;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .sol-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .sol-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Scoundrel layout ─────────────────────────────── */

    .scoundrel-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 24px;
      max-width: 700px;
      width: 100%;
    }

    .scoundrel-top {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .scoundrel-deck {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sol-stack-row {
      display: flex;
      gap: 12px;
    }

    .scoundrel-room {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .sol-room-cards {
      display: flex;
      gap: 10px;
    }

    .sol-room-card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .sol-room-card-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .scoundrel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .scoundrel-weapon {
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .sol-weapon-cards {
      display: flex;
      gap: 4px;
    }

    .sol-weapon-cards .card {
      position: relative;
    }

    /* ── Klondike layout ──────────────────────────────── */

    .sol-top-row {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 12px;
      padding: 16px 20px 8px;
      align-items: flex-start;
    }

    .sol-stock-waste {
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: flex-start;
    }

    .sol-foundations {
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: flex-start;
      margin-left: auto;
    }

    .sol-waste-area {
      display: flex;
      flex-direction: row;
      min-width: 112px;
      min-height: 176px;
      align-items: flex-start;
      cursor: pointer;
    }

    .sol-tableau-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
      padding: 8px 20px 20px;
      flex: 1;
      align-items: flex-start;
      justify-content: center;
    }

    .sol-pile-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
      min-height: 150px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 4px;
      cursor: pointer;
    }
    .sol-pile-col:has(.card) {
      border-color: transparent;
    }

    /* ── Solitaire overlays ────────────────────────────── */

    .sol-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .sol-overlay-msg {
      font-size: 48px;
      font-weight: 700;
      text-shadow: 2px 4px 12px rgba(0,0,0,0.8);
      text-align: center;
    }

    .sol-game-over { color: #cc3333; }
    .sol-win { color: #c9a84c; }

    .sol-valid-target {
      border-color: rgba(201,168,76,0.5) !important;
      background: rgba(201,168,76,0.08) !important;
      box-shadow: 0 0 8px rgba(201,168,76,0.15);
    }

    /* ── Chat ────────────────────────────────────────────── */

    #chat-toggle {
      position: fixed;
      bottom: 180px;
      right: 12px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      padding: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #chat-area {
      position: fixed;
      bottom: 222px;
      right: 12px;
      width: 290px;
      background: rgba(10,18,30,0.94);
      border: 1px solid #253545;
      border-radius: 10px;
      padding: 10px;
      z-index: 49;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-area.collapsed { display: none; }

    #chat-messages {
      height: 150px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chat-message { font-size: 12px; line-height: 1.5; }
    .chat-name { font-weight: 600; color: #c9a84c; margin-right: 3px; }
    .chat-time { font-size: 10px; color: #3a5570; margin-right: 4px; }

    #chat-input { width: 100%; font-size: 13px; }

    /* ── Scrollbar ───────────────────────────────────────── */

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #253545; border-radius: 3px; }

    /* ── Bee ─────────────────────────────────────────────── */

    .bee {
      position: fixed;
      z-index: 100;
      top: 0; left: 0;
      width: 12px; height: 12px;
      background-image: url('./static/bee-sprite.png');
      background-size: 100% 300%;
      image-rendering: pixelated;
      transform: scale(2, 2);
    }
    /* ── Settings panel ───────────────────────────────────── */

    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-panel {
      background: #141e2b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      width: 560px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .settings-header h2 {
      font-size: 20px;
      color: #c9a84c;
      margin: 0;
    }
    .settings-close {
      background: none;
      border: none;
      color: #7a9ab8;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .settings-close:hover { color: #fff; }

    .settings-section {
      margin-bottom: 20px;
    }
    .settings-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      margin: 0 0 10px;
    }

    .settings-card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .settings-card-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      min-width: 90px;
    }
    .settings-card-item:hover {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
    }
    .settings-card-item.selected {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.08);
    }

    .settings-card-preview {
      width: 64px;
      height: 93px;
      background-size: 100% 100%;
      background-color: #000;
      border-radius: 6px;
      box-shadow: 1px 2px 6px rgba(0,0,0,0.5);
    }

    .settings-card-name {
      font-size: 11px;
      color: #9ac0dc;
      text-align: center;
    }

    .settings-bg-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .settings-bg-swatch {
      width: 100px;
      height: 64px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 4px;
      transition: border-color 0.15s;
    }
    .settings-bg-swatch:hover { border-color: rgba(255,255,255,0.25); }
    .settings-bg-swatch.selected { border-color: #c9a84c; }

    .settings-bg-label {
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
  </style>
  <script type="text/javascript" src="dist/frontend/index.js"></script>
</head>
<body>
  <div id="app-container">
    <div id="bees"></div>

    <div id="main-menu">
      <h1 class="menu-title">Cards &amp; Bees</h1>
      <input id="main-menu-username-input" type="text" placeholder="Enter your name" />
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button id="main-menu-play-together" class="btn-gold">Play Together</button>
        <button id="main-menu-solitaire">Solitaire</button>
      </div>
      <button id="open-settings" class="btn-sm" style="margin-top:12px;">Settings</button>
    </div>

    <div id="rooms">
      <div id="rooms-header">
        <button id="back-from-rooms" class="btn-sm">← Back</button>
        <h2>Game Rooms</h2>
        <button id="refresh-rooms" class="btn-sm">↺ Refresh</button>
      </div>
      <div id="rooms-content">
        <div id="rooms-grid"></div>
        <div id="create-room-panel">
          <h3>New Room</h3>
          <input id="room-name-input" type="text" placeholder="Room name" />
          <button id="create-room" class="btn-gold">Create Room</button>
        </div>
      </div>
    </div>

    <div id="solitaire-menu">
      <button id="back-from-solitaire" class="btn-sm" style="align-self:flex-start;margin-bottom:8px;">← Back</button>
      <h2>Solitaire</h2>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
        <button class="solitaire-game" data-gamename="scoundrel">Scoundrel</button>
        <button class="solitaire-game" data-gamename="klondike">Klondike (Draw 1)</button>
        <button class="solitaire-game" data-gamename="klondike-draw-3">Klondike (Draw 3)</button>
      </div>
    </div>

    <div id="game"></div>
  </div>
</body>
</html>
